services:
  rails:
    build: .
    environment:
      RAILS_ENV: development
      BUNDLE_WITHOUT: ""
      BUNDLE_DEPLOYMENT: "0"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    command: >
      bash -c "bundle install && ./bin/docker-entrypoint ./bin/rails server"

volumes:
  bundle_cache:
